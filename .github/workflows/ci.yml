name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rubocop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
      - run: bundle exec rubocop

  rspec:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.1", "3.2", "3.3", "3.4"]
        rails: ["7.0", "7.1", "7.2", "8.0"]
        exclude:
          # Rails 7.0 does not work on Ruby 3.4 (removed default gems / Logger)
          - ruby: "3.4"
            rails: "7.0"
          # Rails 8.0 requires Ruby >= 3.2
          - ruby: "3.1"
            rails: "8.0"
    env:
      RAILS_VERSION: ${{ matrix.rails }}
      PG_CANARY_DB_HOST: localhost
      PG_CANARY_DB_PORT: "5432"
      PG_CANARY_DB_USER: canary
      PG_CANARY_DB_PASSWORD: canary
      PG_CANARY_DB_NAME: pg_canary_test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: canary
          POSTGRES_PASSWORD: canary
          POSTGRES_DB: pg_canary_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U canary -d pg_canary_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
          cache-version: rails-${{ matrix.rails }}
      - run: bundle exec rspec
